<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Error | Purbachal Apparel Limited</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'DM Sans',sans-serif;color:#334155;background:#F8FAFC;line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
.bar{background:#0F1A2E;padding:14px 24px;display:flex;align-items:center}
.bar-brand{display:flex;align-items:center;gap:10px}
.bar-icon{width:28px;height:28px;object-fit:contain;flex-shrink:0}
.bar-name{font-family:'Outfit',sans-serif;font-weight:700;font-size:.95rem;color:#fff;line-height:1.2;letter-spacing:.01em}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px}
.inner{max-width:560px;width:100%;text-align:center}
.code{font-family:'Outfit',sans-serif;font-size:clamp(5rem,15vw,8rem);font-weight:700;color:#E2E8F0;line-height:1;margin-bottom:24px;user-select:none}
.eyebrow{font-family:'Outfit',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#0E7E87;margin-bottom:12px}
h1{font-family:'Outfit',sans-serif;font-size:clamp(1.5rem,4vw,2.25rem);font-weight:700;color:#0F1A2E;margin-bottom:16px;line-height:1.2}
p{color:#64748B;font-size:1rem;margin-bottom:32px;max-width:460px;margin-left:auto;margin-right:auto}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;padding:11px 24px;border-radius:6px;font-family:'Outfit',sans-serif;font-weight:600;font-size:.9rem;transition:.2s}
.btn-primary{background:#0E7E87;color:#fff}
.btn-primary:hover{background:#0b6b73}
.btn-outline{border:1.5px solid #CBD5E1;color:#334155}
.btn-outline:hover{border-color:#0E7E87;color:#0E7E87}
.foot{background:#0F1A2E;color:#94a3b8;text-align:center;padding:20px 24px;font-size:.82rem}
</style>
</head>
<body>
<div class="bar">
  <div class="bar-brand">
    <img src="/purbachal/favicon-32.png" alt="" class="bar-icon">
    <span class="bar-name">Purbachal<br>Apparel Limited</span>
  </div>
</div>
<div class="wrap">
  <div class="inner">
    <div class="code">500</div>
    <p class="eyebrow">Internal Server Error</p>
    <h1>Something Went Wrong on Our End</h1>
    <p>We encountered an unexpected issue while processing your request. Our team has been notified. Please try again in a few minutes.</p>
    <div class="actions">
      <a href="/purbachal/index.php" class="btn btn-primary">Back to Home</a>
      <a href="/purbachal/contact.php" class="btn btn-outline">Contact Us</a>
    </div>
  </div>
</div>
<div class="foot">&copy; <span id="yr"></span> Purbachal Apparel Limited. All rights reserved.</div>
<script>document.getElementById('yr').textContent=new Date().getFullYear()</script>
</body>
</html>
